name = "${WORKER_NAME}"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_id = "${D1_DATABASE_ID}"

[vars]
DOMAIN = "${DOMAIN}"
CALLSIGN = "${CALLSIGN}"
BLOG_URL = "${BLOG_URL}"
QRZ_URL = "${QRZ_URL}"
MY_GRIDS = "${MY_GRIDS}"
ADMIN_EMAIL = "${ADMIN_EMAIL}"
ADMIN_PASSWORD_HASH = "${ADMIN_PASSWORD_HASH}"
SESSION_SECRET = "${SESSION_SECRET}"
